<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='style-login.css') }}">
</head>

<body>
    <form action="" method="POST">
        <div class="login">
            <div class="mensagem_erro">
                {% if mensagem %}
                <p style="color: red;">{{ mensagem }}</p>
                {% endif %}

            </div>
            <label for="">
                Username
            </label>
            <br>
            <input type="text" name="usuario" id="" placeholder=" Username">
            <br>
            <label for="">
                Passoword
            </label>
            <br>
            <input type="password" name="senha" id="" placeholder=" Passoword">
        </div>
        <br>
        <button type="submit"> Login </button>
    </form>
</body>

</html>
